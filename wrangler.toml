name = "chemvault-user"
compatibility_date = "2026-06-23"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "chemvault_user"
database_id = "52eb0a6f-2905-4bd2-a58c-e95c262bb47f"

[[r2_buckets]]
binding = "AVATARS"
bucket_name = "chemvault-user-avatars"

[vars]
COOKIE_NAME = "chemvault_session"
COOKIE_DOMAIN = ".chemvault.science"
NODE_ENV = "production"
MAIL_APPLICATION_TO = "it.apply@chemvault.science"
MAIL_APPLICATION_FROM = "no-reply@chemvault.science"
LIFECYCLE_REQUIRED_SERVICES = "billing,files,lab,notifications,mail,extract"
BILLING_LIFECYCLE_URL = "https://chemvault.science/api/internal/lifecycle"
FILES_LIFECYCLE_URL = "https://file.chemvault.science/api/internal/lifecycle"
LAB_LIFECYCLE_URL = "https://lab.chemvault.science/api/internal/lifecycle"
NOTIFICATIONS_LIFECYCLE_URL = "https://notify.chemvault.science/api/internal/lifecycle"
MAIL_LIFECYCLE_URL = "https://mail.chemvault.science/api/internal/lifecycle"
EXTRACT_LIFECYCLE_URL = "https://api.chemvault.science/internal/lifecycle"
# Optional once the mail system exposes an SSO authorize endpoint:
# MAIL_SYSTEM_SSO_URL = "https://mail.chemvault.science/api/sso/authorize"
# Optional once Apple Developer Sign in with Apple is configured:
# APPLE_CLIENT_ID = "science.chemvault.user"
# APPLE_TEAM_ID = "YOUR_APPLE_TEAM_ID"
# APPLE_KEY_ID = "YOUR_APPLE_KEY_ID"
# APPLE_REDIRECT_URI = "https://user.chemvault.science/api/auth/sso/apple/callback"
# Optional third-party OAuth providers:
AUTH_URL = "https://user.chemvault.science"
# GOOGLE_CLIENT_ID = "YOUR_GOOGLE_WEB_CLIENT_ID"
MICROSOFT_CLIENT_ID = "7dd41e6a-b2be-491b-b630-abef9bfdd23c"
MICROSOFT_TENANT_ID = "common"
# GITHUB_CLIENT_ID = "YOUR_GITHUB_OAUTH_APP_CLIENT_ID"
# Optional after creating a Cloudflare Turnstile widget for user.chemvault.science:
# TURNSTILE_SITE_KEY = "0x4AAAA..."
# TURNSTILE_EXPECTED_HOSTNAME = "user.chemvault.science"

# Configure secrets outside this file:
# wrangler pages secret put JWT_SECRET --project-name chemvault-user
# wrangler pages secret put MAIL_SYSTEM_SYNC_SECRET --project-name chemvault-user
# wrangler pages secret put MAIL_SYSTEM_SSO_SECRET --project-name chemvault-user
# If MAIL_SYSTEM_SSO_SECRET is not set, mail SSO falls back to MAIL_SYSTEM_SYNC_SECRET.
# wrangler pages secret put CLOUDFLARE_EMAIL_ACCOUNT_ID --project-name chemvault-user
# wrangler pages secret put CLOUDFLARE_EMAIL_API_TOKEN --project-name chemvault-user
# wrangler pages secret put APPLE_PRIVATE_KEY --project-name chemvault-user
# wrangler pages secret put AUTH_SECRET --project-name chemvault-user
# wrangler pages secret put GOOGLE_CLIENT_SECRET --project-name chemvault-user
# wrangler pages secret put MICROSOFT_CLIENT_SECRET --project-name chemvault-user
# wrangler pages secret put GITHUB_CLIENT_SECRET --project-name chemvault-user
# wrangler pages secret put TURNSTILE_SECRET_KEY --project-name chemvault-user
# wrangler pages secret put LIFECYCLE_SERVICE_SECRET --project-name chemvault-user
# wrangler pages secret put BILLING_SERVICE_SECRET --project-name chemvault-user
# The value must match the main billing API and consuming services; never store it in vars.
